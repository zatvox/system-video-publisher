<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZV Publicidad Digital – Carrusel TV</title>
  <style>
    /* ── RESET TOTAL para TV ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
      cursor: none; /* Sin cursor en modo kiosk */
    }

    /* ── SLIDE CONTAINER ── */
    #slide-container {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      transition: opacity 300ms ease;
    }

    #slide-container img,
    #slide-container video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* ── BARRA DE PROGRESO (sutil, borde inferior) ── */
    #progress-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.1);
      z-index: 100;
    }

    #progress-bar-fill {
      height: 100%;
      width: 0%;
      background: rgba(27, 79, 216, 0.8);
      transition: width 10s linear;
    }

    /* ── STATUS (conexión / fuera de horario) ── */
    #tv-status {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0,0,0,0.7);
      color: rgba(255,255,255,0.6);
      font-family: -apple-system, sans-serif;
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 20px;
      z-index: 200;
      display: none;
    }

    /* ── STANDBY (sin anuncios) ── */
    .tv-standby {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      color: rgba(255,255,255,0.15);
      font-family: -apple-system, sans-serif;
    }

    .standby-logo {
      font-size: 120px;
      font-weight: 900;
      letter-spacing: -6px;
      margin-bottom: 20px;
      background: linear-gradient(135deg, rgba(27,79,216,0.3), rgba(249,115,22,0.3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tv-standby p {
      font-size: 18px;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    /* ── FUERA DE HORARIO ── */
    .fuera-horario {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      color: rgba(255,255,255,0.3);
      font-family: -apple-system, sans-serif;
      text-align: center;
      gap: 16px;
    }

    .fuera-horario-icon { font-size: 80px; }

    .fuera-horario h1 {
      font-size: 28px;
      font-weight: 300;
      color: rgba(255,255,255,0.4);
    }

    .fuera-horario p {
      font-size: 16px;
      color: rgba(255,255,255,0.2);
    }

    /* ── LOGO OVERLAY (esquina) – opcional, descomenta si quieres marca de agua ── */
    /*
    #tv-logo {
      position: fixed;
      bottom: 20px;
      left: 20px;
      opacity: 0.3;
      height: 30px;
      z-index: 100;
    }
    */
  </style>
</head>
<body>
  <!-- Contenedor principal del slide -->
  <div id="slide-container" aria-live="polite" aria-atomic="true" aria-label="Anuncio publicitario actual">
    <div class="tv-standby">
      <div class="standby-logo">ZV</div>
      <p>ZV Publicidad Digital</p>
    </div>
  </div>

  <!-- Barra de progreso sutil -->
  <div id="progress-bar" aria-hidden="true">
    <div id="progress-bar-fill"></div>
  </div>

  <!-- Estado de conexión (solo visible si hay error) -->
  <div id="tv-status" role="status" aria-live="polite"></div>

  <!-- Logo de marca de agua (opcional) -->
  <!-- <img id="tv-logo" src="assets/images/logo.png" alt=""> -->

  <script type="module">
    import { iniciarReproductor, iniciarHeartbeat } from './assets/js/tv-player.js';

    // Parámetro opcional: nombre de la pantalla para heartbeat
    const params = new URLSearchParams(window.location.search);
    const pantallaNombre = params.get('pantalla') || 'TV Principal';

    // Arrancar reproductor
    document.addEventListener('DOMContentLoaded', async () => {
      await iniciarReproductor();

      // Heartbeat opcional (solo si se pasa ?pantalla=NombreTV en la URL)
      if (params.get('pantalla')) {
        await iniciarHeartbeat(pantallaNombre);
      }
    });

    // Prevenir que la TV duerma: enviar evento de interacción cada 5 min
    setInterval(() => {
      document.dispatchEvent(new MouseEvent('mousemove'));
    }, 5 * 60 * 1000);

    // Prevenir menú contextual en kiosk mode
    document.addEventListener('contextmenu', e => e.preventDefault());
  </script>
</body>
</html>
